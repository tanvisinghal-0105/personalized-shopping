timeout: 600s
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: cymbal-frontend
  _SA_NAME: live-agent-backend

steps:
# Step 1: Validate assets + formatting checks
- name: 'python:3.12-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    pip install -q 'black==25.1.0'
    echo "========== ASSET CHECK =========="
    if grep -r '\./assets/' client/index.html client/src/ 2>/dev/null; then
      echo "ERROR: Found local ./assets/ references. All assets should use GCS URLs."
      exit 1
    fi
    echo "Asset references OK"
    echo "========== SYNTAX CHECK =========="
    find crm/ -name "*.py" -exec python -c "import ast; ast.parse(open('{}').read())" \;
    echo "Syntax validation passed"
    echo "========== BLACK =========="
    python -m black --check --diff crm/core/ crm/main.py
  id: 'checks'

# Step 2: Build with git SHA tag
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '--no-cache'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - '-f'
  - 'frontend.Dockerfile'
  - '.'
  id: 'build'
  waitFor: ['checks']

# Step 3: Push tagged images
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA' ]
  id: 'push-sha'
  waitFor: ['build']

- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest' ]
  id: 'push-latest'
  waitFor: ['build']

# Step 4: Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '--region'
  - '${_REGION}'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--port'
  - '8080'
  - '--set-env-vars'
  - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO,GCS_BUCKET_NAME=${PROJECT_ID}-shopping-assets'
  - '--service-account'
  - '${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'
  - '--cpu'
  - '1'
  - '--memory'
  - '512Mi'
  - '--min-instances'
  - '0'
  - '--max-instances'
  - '10'
  id: 'deploy'
  waitFor: ['push-sha']

images:
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

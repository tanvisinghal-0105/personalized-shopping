timeout: 600s
steps:
# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'build', '--no-cache', '-t', 'gcr.io/$PROJECT_ID/cymbal-crm', '.' ]

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/cymbal-crm' ]

# Deploy container image to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'cymbal-crm'
  - '--image'
  - 'gcr.io/$PROJECT_ID/cymbal-crm'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO'
  - '--service-account'
  - 'live-agent-backend@${PROJECT_ID}.iam.gserviceaccount.com'
  - '--cpu'
  - '1'
  - '--memory'
  - '512Mi'

images:
- 'gcr.io/$PROJECT_ID/cymbal-crm'

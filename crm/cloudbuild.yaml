timeout: 600s
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: cymbal-crm
  _SERVICE_ACCOUNT: live-agent-backend@${PROJECT_ID}.iam.gserviceaccount.com

steps:
# Step 1: Syntax + formatting checks (parallel)
- name: 'python:3.12-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    pip install -q uv
    uv pip install --system -q black
    echo "========== SYNTAX CHECK =========="
    find . -name "*.py" -exec python -c "import ast; ast.parse(open('{}').read())" \;
    echo "Syntax validation passed"
    echo "========== BLACK =========="
    python -m black --check --diff core/ main.py
  dir: 'crm'
  id: 'checks'

# Step 2: Build with git SHA tag
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '--no-cache'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - './crm'
  id: 'build'
  waitFor: ['checks']

# Step 3: Push tagged images
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA' ]
  id: 'push-sha'
  waitFor: ['build']

- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest' ]
  id: 'push-latest'
  waitFor: ['build']

# Step 4: Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '--region'
  - '${_REGION}'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO,GCS_BUCKET_NAME=${PROJECT_ID}-shopping-assets'
  - '--service-account'
  - '${_SERVICE_ACCOUNT}'
  - '--cpu'
  - '1'
  - '--memory'
  - '512Mi'
  id: 'deploy'
  waitFor: ['push-sha']

images:
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

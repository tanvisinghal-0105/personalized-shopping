timeout: 600s
steps:
# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'build', '-t', 'gcr.io/$PROJECT_ID/cymbal-frontend', '.' ]

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/cymbal-frontend' ]

# Deploy container image to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'cymbal-frontend'
  - '--image'
  - 'gcr.io/$PROJECT_ID/cymbal-frontend'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--port'
  - '8080'
  - '--cpu'
  - '1'
  - '--memory'
  - '256Mi'
  - '--min-instances'
  - '0'
  - '--max-instances'
  - '10'

images:
- 'gcr.io/$PROJECT_ID/cymbal-frontend'

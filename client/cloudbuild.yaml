timeout: 600s
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: cymbal-frontend

steps:
# Step 1: Validate HTML/JS syntax
- name: 'node:20-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Checking for broken asset references..."
    # Verify no local ./assets/ references remain (should all be GCS URLs)
    if grep -r '\./assets/' index.html src/ 2>/dev/null; then
      echo "ERROR: Found local ./assets/ references. All assets should use GCS URLs."
      exit 1
    fi
    echo "Asset references OK -- all pointing to GCS"
  dir: 'client'
  id: 'validate'

# Step 2: Build the container image with git SHA tag
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - '.'
  dir: 'client'
  id: 'build'
  waitFor: ['validate']

# Step 3: Push tagged images
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA' ]
  id: 'push-sha'
  waitFor: ['build']

- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest' ]
  id: 'push-latest'
  waitFor: ['build']

# Step 4: Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '--region'
  - '${_REGION}'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--port'
  - '8080'
  - '--cpu'
  - '1'
  - '--memory'
  - '256Mi'
  - '--min-instances'
  - '0'
  - '--max-instances'
  - '10'
  id: 'deploy'
  waitFor: ['push-sha']

images:
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

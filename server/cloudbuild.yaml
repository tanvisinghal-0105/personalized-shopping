timeout: 1200s
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: live-agent-backend
  _SA_NAME: live-agent-backend

steps:
# Step 1: Run unit tests
- name: 'python:3.12-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    pip install -q pytest black mypy
    pip install -q -r requirements.txt
    echo "========== PYTEST =========="
    python -m pytest tests/ -v --tb=short
  dir: 'server'
  id: 'pytest'

# Step 2: Code formatting check (black) -- runs in parallel
- name: 'python:3.12-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    pip install -q 'black==25.1.0'
    echo "========== BLACK =========="
    python -m black --check --diff core/ evaluation/ tests/ config/ server.py scripts/
  dir: 'server'
  id: 'black'
  waitFor: ['-']

# Step 3: Type checking (mypy) -- runs in parallel
- name: 'python:3.12-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    pip install -q mypy
    pip install -q -r requirements.txt
    echo "========== MYPY =========="
    python -m mypy evaluation/ tests/ --ignore-missing-imports --explicit-package-bases --no-error-summary || true
  dir: 'server'
  id: 'mypy'
  waitFor: ['-']

# Step 4: Syntax validation -- runs in parallel
- name: 'python:3.12-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "========== SYNTAX CHECK =========="
    find . -name "*.py" -exec python -c "import ast; ast.parse(open('{}').read())" \;
    echo "Syntax validation passed"
  dir: 'server'
  id: 'syntax-check'
  waitFor: ['-']

# Step 5: Build with git SHA tag (only after all checks pass)
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '--no-cache'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - '.'
  dir: 'server'
  id: 'build'
  waitFor: ['pytest', 'black', 'syntax-check']

# Step 6: Push tagged images
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA' ]
  id: 'push-sha'
  waitFor: ['build']

- name: 'gcr.io/cloud-builders/docker'
  args: [ 'push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest' ]
  id: 'push-latest'
  waitFor: ['build']

# Step 7: Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - '--region'
  - '${_REGION}'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=1,DEMO_TYPE=retail,VOICE_VERTEX_API=Aoede,LANGUAGE=en-GB,GCS_BUCKET_NAME=${PROJECT_ID}-shopping-assets'
  - '--service-account'
  - '${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'
  - '--session-affinity'
  - '--timeout'
  - '900'
  - '--concurrency'
  - '1'
  - '--cpu'
  - '2'
  - '--memory'
  - '2Gi'
  id: 'deploy'
  waitFor: ['push-sha']

images:
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

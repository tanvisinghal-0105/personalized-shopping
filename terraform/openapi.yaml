swagger: "2.0"
info:
  title: "Cymbal StyleSync API"
  description: "API Gateway for the Cymbal StyleSync shopping assistant backend"
  version: "1.0.0"
schemes:
  - "https"
produces:
  - "application/json"
x-google-backend:
  address: "${backend_url}"
  protocol: h2
paths:
  /health:
    get:
      summary: "Health check"
      operationId: "healthCheck"
      responses:
        200:
          description: "Service is healthy"
  /ws:
    get:
      summary: "WebSocket connection for Gemini Live"
      operationId: "websocketConnect"
      responses:
        101:
          description: "WebSocket upgrade"
